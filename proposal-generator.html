<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="proposal-style.css">
<style>
/* ════════════════════════════════════════════════════
   APP UI — Estilos do Gerador (não editar)
════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --ink:#111010;--ink-soft:#1A1A22;
  --gold:#B8892A;--gold-lt:#f5eed8;--gold-mid:#d4a843;
  --accent:#1a5fbf;
  --rule:#e8e3da;--rule-lt:#f0ece4;
  --muted:#8a8478;--faint:#b8b0a4;
  --bg:#F5F3EF;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,-apple-system,Arial,sans-serif;
  --red:#c0392b;--red-lt:#fdf0ee;
  --green:#1c6b3a;--green-lt:#eef7f2;
}

body{background:var(--bg);font-family:var(--sans);font-size:15px;color:var(--ink);-webkit-font-smoothing:antialiased;}

/* APP BAR */
.app-bar{display:flex;align-items:center;gap:16px;padding:14px 24px;background:white;border-bottom:1.5px solid var(--rule);position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.app-brand{display:flex;align-items:center;gap:12px;}
.app-mark{width:32px;height:32px;background:var(--ink);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.app-mark span{font-family:var(--serif);font-size:11px;color:var(--gold);font-weight:700;}
.app-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.app-name{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:-.3px;}
.steps{display:flex;align-items:center;gap:0;margin-left:auto;}
.si{display:flex;align-items:center;gap:6px;}
.sn{width:28px;height:28px;border-radius:50%;border:2px solid var(--rule);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);transition:all .2s;}
.sn.active{border-color:var(--ink);color:var(--ink);}
.sn.done{background:var(--ink);border-color:var(--ink);color:white;}
.sl{font-size:12px;color:var(--muted);}
.sl.active{color:var(--ink);font-weight:600;}
.ss{width:32px;height:2px;background:var(--rule);margin:0 4px;}

/* APP BODY */
.app-body{max-width:600px;margin:0 auto;padding:36px 20px 80px;}

/* CARDS */
.card{background:white;border:1.5px solid var(--rule);border-radius:12px;padding:20px 20px 16px;margin-bottom:16px;}
.card-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:18px;}
.sec-head{margin-bottom:28px;}
.sec-head h2{font-family:var(--serif);font-size:28px;font-weight:700;letter-spacing:-.3px;}
.sec-head p{font-size:13px;color:var(--muted);margin-top:5px;}

/* FORMS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.g2{grid-template-columns:1fr;}}
.s2{grid-column:span 2;}
.fl{display:flex;flex-direction:column;gap:6px;}
label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);}
input:not([type=radio]):not([type=checkbox]),select,textarea{padding:12px 14px;background:var(--bg);border:1.5px solid var(--rule);border-radius:8px;font-size:14px;font-family:var(--sans);outline:none;transition:border-color .15s,background .15s;width:100%;}
input[type=radio],input[type=checkbox]{width:auto;}
input:focus,select:focus,textarea:focus{border-color:var(--ink);background:white;}
textarea{resize:vertical;min-height:70px;}
.fl input.invalid,.fl textarea.invalid{border-color:#c0392b!important;background:#fff8f7!important;}
.val-msg{font-size:11px;color:#c0392b;margin-top:4px;display:none;}
.fl input.invalid~.val-msg,.fl textarea.invalid~.val-msg{display:block;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;font-family:var(--sans);}
.btn-primary{background:var(--ink);color:white;}
.btn-primary:hover{background:#2a2828;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:white;border-color:var(--rule);color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-sm{padding:8px 14px;font-size:12px;}
.r-end{display:flex;justify-content:flex-end;gap:10px;margin-top:8px;}
.r-bet{display:flex;justify-content:space-between;gap:10px;margin-top:8px;}
.r-btw{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:20px;padding:16px 0;border-top:1px solid var(--rule);position:sticky;bottom:0;background:var(--bg);}

/* CATALOGUE */
.cat-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.ctab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--rule);font-size:12px;font-weight:500;cursor:pointer;background:white;transition:all .15s;}
.ctab:hover{border-color:var(--ink);}
.ctab.on{background:var(--ink);border-color:var(--ink);color:white;}
.prow{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border-bottom:1px solid var(--rule-lt);transition:background .1s;}
.prow:hover{background:#fdfcfa;}
.pck{width:28px;height:28px;border-radius:50%;border:2px solid var(--rule);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .15s;color:transparent;background:white;}
.pck:hover{border-color:var(--gold);}
.pck.on{background:var(--ink);border-color:var(--ink);color:white;}
.pi{flex:1;min-width:0;}
.pn{font-weight:600;font-size:14px;margin-bottom:2px;}
.pr{font-size:10px;color:var(--faint);font-family:monospace;margin-bottom:4px;}
.pp{font-family:var(--serif);font-size:16px;font-weight:700;white-space:nowrap;}
.cw{display:flex;flex-direction:column;gap:0;margin-top:12px;border:1px solid var(--rule);border-radius:8px;overflow:hidden;}
.ci{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid var(--rule-lt);font-size:13px;background:white;}
.ci:last-child{border-bottom:none;}
.ci-ca{flex-shrink:0;padding-top:2px;}
.ci-ic{width:18px;height:18px;border-radius:50%;background:var(--green-lt);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-weight:500;font-size:13px;margin-bottom:2px;}
.ci-det{font-size:11px;color:var(--muted);}
.ci-pa{flex-shrink:0;text-align:right;}
.ci-price{font-family:var(--serif);font-size:14px;font-weight:600;}
.ci-struck{text-decoration:line-through;color:var(--faint);font-size:12px;display:block;}
.ci-zero{color:var(--red);font-size:12px;font-weight:600;}
.bdg{display:inline-block;font-size:9px;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:3px;margin-top:4px;font-weight:600;margin-right:4px;}
.bdg-inc{background:var(--green-lt);color:var(--green);}
.bdg-ao{background:var(--gold-lt);color:#8a6020;}
.bdg-off{background:var(--red-lt);color:var(--red);}
.disc-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:6px;}
.disc-row.active{background:#eef7f2;}
.disc-label{font-size:11px;font-weight:600;color:var(--muted);}
.disc-type-toggle{display:flex;gap:3px;}
.disc-result{font-size:12px;font-weight:600;color:var(--green);}
.qty-ctrl{display:flex;align-items:center;gap:6px;margin-top:6px;justify-content:flex-end;}
.qb{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--rule);background:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.qb:hover{border-color:var(--ink);}
.qv{font-size:13px;font-weight:600;min-width:20px;text-align:center;}
.dtt{padding:5px 10px;border-radius:6px;border:1.5px solid var(--rule);font-size:11px;font-weight:600;cursor:pointer;background:white;}
.dtt.on{background:var(--ink);color:white;}
.disc-input{width:90px!important;padding:8px 10px!important;}
.add-another{display:flex;align-items:center;gap:8px;padding:12px 16px;border:1.5px dashed var(--rule);border-radius:10px;cursor:pointer;color:var(--muted);font-size:13px;margin-top:8px;transition:all .15s;}
.add-another:hover{border-color:var(--gold);color:var(--gold);}

/* PAYMENT PRESETS */
.pay-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;align-items:stretch;}
.pay-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1.5px solid var(--rule);border-radius:8px;cursor:pointer;transition:all .15s;background:white;width:100%;box-sizing:border-box;}
.pay-opt:hover{border-color:var(--gold-mid);}
.pay-opt.on{border-color:var(--gold);background:var(--gold-lt);}
.pay-opt input[type=radio]{margin-top:2px;flex-shrink:0;accent-color:var(--gold);}
.pay-opt>div{flex:1;min-width:0;}
.pay-opt-label{font-size:13px;font-weight:500;line-height:1.4;color:var(--ink);}
.pay-opt-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5;}
.pay-prestacoes{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.pay-prestacoes input{width:60px!important;padding:7px 10px!important;text-align:center;}

/* REVIEW */
.rv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
@media(max-width:480px){.rv-grid{grid-template-columns:1fr;}}
.kv{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:8px 0;border-bottom:1px solid var(--rule-lt);font-size:13px;}
.kv .k{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.kv .v{font-weight:500;text-align:right;}
.gtr{display:flex;justify-content:space-between;align-items:center;padding:12px 0;}

/* DRAG TO REORDER */
.order-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.order-item{background:white;border:1.5px solid var(--rule);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:grab;user-select:none;transition:all .15s;touch-action:none;}
.order-item:active{cursor:grabbing;}
.order-item.dragging{opacity:.4;border-style:dashed;border-color:var(--gold);}
.order-item.drag-over{border-color:var(--gold);background:var(--gold-lt);transform:scale(1.01);}
.drag-handle{display:flex;flex-direction:column;gap:3px;flex-shrink:0;opacity:.35;padding:2px;}
.drag-handle span{display:block;width:18px;height:2px;background:var(--ink);border-radius:1px;}
.order-item-name{flex:1;font-size:14px;font-weight:500;}
.order-item-price{font-family:var(--serif);font-size:15px;color:var(--muted);flex-shrink:0;}
.order-hint{font-size:11px;color:var(--muted);text-align:center;padding:8px 0;letter-spacing:.5px;}

/* HISTORY MODAL */
.hist-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--rule-lt);cursor:pointer;}
.hist-row:hover{background:var(--bg);}
.hist-doc{font-weight:600;font-size:13px;}
.hist-client{font-size:12px;color:var(--muted);}
.hist-total{font-family:var(--serif);font-size:15px;font-weight:700;margin-left:auto;flex-shrink:0;}
.hist-date{font-size:10px;color:var(--faint);}

/* COLOUR PICKER */
.colour-picker{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;padding:10px 12px;background:white;border:1.5px solid var(--rule-lt);border-radius:8px;}
.colour-swatch{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;flex-shrink:0;position:relative;}
.colour-swatch:hover{transform:scale(1.15);}
.colour-swatch.selected{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-lt),0 0 0 4px var(--gold);}
.colour-swatch[title]:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:white;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:99;}
.colour-selected-label{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:6px;}
.colour-selected-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0;}

/* OUT BAR */
.out-bar{display:flex;align-items:center;gap:10px;padding:14px 24px;background:white;border-bottom:1.5px solid var(--rule);flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.lang-tog{display:flex;gap:4px;}
.lb{padding:6px 12px;border-radius:6px;border:1.5px solid var(--rule);font-size:11px;font-weight:600;cursor:pointer;background:white;transition:all .15s;}
.lb.on{background:var(--ink);color:white;}

/* DOC WRAP */
#doc-wrap{display:none;}
#doc-wrap.visible{display:block;}
.page{max-width:820px;margin:0 auto;background:white;box-shadow:0 4px 32px rgba(0,0,0,.1);}

/* SUMMARY ROW (sum-breakdown in step 3) */
.sum-breakdown{border:1px solid var(--rule);border-bottom:none;}
.sum-row{border-bottom:1px solid var(--rule);}
.sum-row-main{display:flex;justify-content:space-between;align-items:center;padding:13px 20px;font-size:13px;}
.sum-row-main .sk{color:var(--muted);}
.sum-row-main .sv{font-family:var(--serif);font-size:16px;}
.sum-sub-lines{padding:0 20px 10px;}
.sum-sub-line{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;}
.sum-sub-line .sk{color:var(--muted);}
.sum-sub-line.offer .sk{color:var(--red);}
.sum-sub-line.offer .sv{color:var(--red);font-family:var(--serif);}
.sum-sub-line.disc .sk{color:var(--green);}
.sum-sub-line.disc .sv{color:var(--green);font-family:var(--serif);}
.sum-sub-line.net{border-top:1px solid var(--rule-lt);margin-top:4px;padding-top:6px;}
.sum-sub-line.net .sk{color:var(--ink);font-weight:600;}
.sum-sub-line.net .sv{font-family:var(--serif);font-size:14px;color:var(--ink);}
.sum-row.iva{background:#faf9f7;}

/* MOBILE */
@media(max-width:820px){.page{box-shadow:none;}}
@media(max-width:600px){
  .cover-top,.cover-mid,.cover-bottom,.d-contacts,.d-intro,
  .d-prod-eyebrow,.d-prod-name,.d-prod-desc,.d-summary,.d-conds,.d-footer,.pg-rule
  {padding-left:16px!important;padding-right:16px!important;}
  .tbl-pad{padding:0!important;}
  .d-sig{margin-left:0;margin-right:0;}
  .cover-title{font-size:32px;letter-spacing:-1px;}
  .sum-total-val{font-size:32px;}
  .d-prod-name{font-size:22px;}
  .cover-bottom{flex-direction:column;align-items:flex-start;gap:12px;}
  .d-cname{font-size:18px;}
  .tbl-pad{overflow-x:auto;-webkit-overflow-scrolling:touch;display:block;}
  .d-tbl{min-width:480px;}
  .sum-total-block{flex-direction:column;align-items:flex-start;gap:16px;}
  .sum-row-main{flex-wrap:wrap;}
  .cond-row{grid-template-columns:1fr;}
  .cond-v{border-left:none!important;border-top:1px solid var(--rule-lt);padding:8px 0 12px;}
  .d-sig-fields{grid-template-columns:1fr;}
  .d-sig-body{padding:16px;}
  .out-bar{padding:12px 16px;gap:8px;}
}

/* PRINT */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:white!important;}
  .app-bar,.out-bar,.no-print{display:none!important;}
  .app-body{display:none!important;}
  #doc-wrap{display:block!important;}
  .page{box-shadow:none;max-width:100%;width:100%;}
  .tbl-pad{padding:0 52px!important;overflow:visible!important;display:block;}
  .d-sig{margin-left:52px;margin-right:52px;}
  .d-tbl{min-width:unset;width:100%;}
  .d-tbl td,.d-tbl th{font-size:10px;padding:8px 10px;}
  .d-prod-wrap{page-break-inside:avoid;}
  .d-sig{page-break-inside:avoid;}
  @page{margin:14mm 12mm;size:A4;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="position:fixed;inset:0;z-index:9999;background:var(--ink);display:flex;align-items:center;justify-content:center">
  <div style="background:white;border-radius:16px;padding:48px 40px;width:100%;max-width:380px;box-shadow:0 24px 80px rgba(0,0,0,.4)">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-family:var(--serif);font-size:22px;font-weight:900;color:var(--ink);letter-spacing:-.5px">Dental Smart Price</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase">Proposal Generator</div>
    </div>
    <div class="fl" style="margin-bottom:14px">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="email@dentalsmartprice.pt" style="width:100%">
    </div>
    <div class="fl" style="margin-bottom:20px">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="••••••••" style="width:100%">
    </div>
    <div id="login-error" style="display:none;color:#c0392b;font-size:12px;margin-bottom:14px;text-align:center"></div>
    <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center">Entrar</button>
    <div id="login-loading" style="display:none;text-align:center;color:var(--muted);font-size:13px;margin-top:12px">A verificar...</div>
  </div>
</div>

<div class="app-bar" id="app-bar">
  <div class="app-brand">
    <div class="app-mark"><span>DSP</span></div>
    <div><div class="app-label">Internal Tool</div><div class="app-name">Proposal Generator</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
    <button class="btn btn-ghost btn-sm" id="btn-history" style="font-size:11px">📋 Histórico</button>
    <span id="user-label" style="font-size:11px;color:var(--muted);padding:0 4px"></span>
    <button class="btn btn-ghost btn-sm" id="btn-logout" style="font-size:11px">Sair</button>
  </div>
  <div class="steps" id="steps-bar"></div>
</div>

<div class="app-body" id="app-body">
  <div id="step-1"></div>
  <div id="step-2" style="display:none"></div>
  <div id="step-3" style="display:none"></div>
</div>

<div id="doc-wrap">
  <div class="out-bar no-print">
    <div class="lang-tog">
      <button class="lb on" id="lang-pt" onclick="setLang('pt')">PT</button>
      <button class="lb" id="lang-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-edit">← Editar</button>
    <button class="btn btn-ghost btn-sm" id="btn-dup" title="Duplicar proposta">⊕ Duplicar</button>
    <button class="btn btn-ghost btn-sm" id="btn-new">Nova Proposta</button>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" id="btn-email" title="Abrir e-mail">✉ E-mail</button>
      <button class="btn btn-ghost btn-sm" id="btn-internal" title="PDF Interno">🔒 Interno</button>
      <button class="btn btn-primary btn-sm" id="btn-pdf">⎙ PDF Cliente</button>
    </div>
  </div>
  <div class="page" id="doc-page"></div>
</div>

<!-- HISTORY MODAL -->
<div id="hist-modal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.45);overflow-y:auto">
  <div style="background:white;max-width:680px;margin:40px auto;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="background:#111010;padding:24px 32px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px">Dental Smart Price</div>
        <div style="font-family:'Playfair Display',serif;font-size:20px;color:white;font-weight:700">Histórico de Propostas</div>
      </div>
      <button id="hist-close" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer;padding:4px">×</button>
    </div>
    <div id="hist-body" style="padding:24px 32px;max-height:70vh;overflow-y:auto"></div>
  </div>
</div>

<script>
// ══ TRANSLATIONS ══════════════════════════
const T={
  pt:{
    docTitle:"Proposta de\nFornecimento",preparedFor:"Preparada para",contacts:"Contactos",proposal:"Proposta",

async function loadCatalogue(){
  if(!APPS_SCRIPT_URL){
    CATALOGUE = CATALOGUE_FALLBACK;
    return;
  }
  try{
    const res = await callAPI('getCatalogue');
    if(res && res.status==='ok' && res.catalogue && res.catalogue.length>0){
      CATALOGUE = res.catalogue;
    } else {
      CATALOGUE = CATALOGUE_FALLBACK;
    }
  } catch(e){
    console.warn('Catalogue load failed, using fallback:', e);
    CATALOGUE = CATALOGUE_FALLBACK;
  }
}

// ── Proposal history ─────────────────────────────────────
const HIST_KEY='dsp_history_v1';
const MAX_HIST=20;
function saveToHistory(snapshot){
  try{
    const hist=getHistory();
    // avoid duplicate saves (same docNum)
    const idx=hist.findIndex(h=>h.docNum===snapshot.docNum);
    if(idx>=0) hist.splice(idx,1);
    hist.unshift(snapshot);
    if(hist.length>MAX_HIST) hist.splice(MAX_HIST);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function getHistory(){
  try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch(e){return [];}
}
function deleteFromHistory(docNum){
  try{
    const hist=getHistory().filter(h=>h.docNum!==docNum);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}

}

const fmt=n=>Number(n).toLocaleString("pt-PT",{minimumFractionDigits:2,maximumFractionDigits:2})+"€";
const buildPrestacoes=(n,total)=>{
  const base=total?fmt(Math.round(total*0.30*100)/100):null;
  const rest=total?Math.round(total*0.70*100)/100:null;
  const parc=n&&rest?fmt(Math.round(rest/n*100)/100):null;
  if(total){
    const adjStr=`30% na adjudicação (${base})`;
    const parcStr=n&&parc?` + ${n} prestações mensais de ${parc} em débito directo.`:' + prestações mensais em débito directo (número a definir).';
    return adjStr+parcStr;
  }
  return n?`30% na adjudicação + ${n} prestações mensais em débito directo.`:'30% na adjudicação + prestações mensais em débito directo (número a definir).';
};
// build full payment condition text with amounts
const buildDeliveryCondition=(preset,custom)=>{
  switch(preset){
    case 'imediato':   return 'Imediato, salvo rutura de stock na data de aceitação.';
    case '24-48h':     return 'Entrega prevista em 24 a 48 horas úteis após adjudicação.';
    case '1-2sem':     return 'Entrega prevista em 1 a 2 semanas após adjudicação.';
    case '2-4sem':     return 'Entrega prevista em 2 a 4 semanas após adjudicação.';
    case 'aguardar':   return 'A aguardar chegada de stock. Prazo a confirmar após adjudicação.';
    case 'combinar':   return 'Prazo de entrega a combinar com o cliente.';
    case 'custom':     return custom||'';
    default:           return 'Imediato, salvo rutura de stock na data de aceitação.';
  }
};
const buildPaymentCondition=(preset,prestacoes,custom,totalWithVAT)=>{
  const t=totalWithVAT||0;
  const f30=t?fmt(Math.round(t*0.30*100)/100):'30%';
  const f50=t?fmt(Math.round(t*0.50*100)/100):'50%';
  const f70=t?fmt(Math.round(t*0.70*100)/100):'70%';
  const ftot=t?fmt(t):'total';
  switch(preset){
    case 'antecipado':  return `Antecipado. Pagamento total${t?' de '+ftot:''} antes da entrega.`;
    case 'pronto':      return `Pronto-pagamento. Pagamento total${t?' de '+ftot:''} no acto de entrega.`;
    case '30-70':       return `30% na adjudicação${t?' ('+f30+')':''} + 70% na entrega${t?' ('+f70+')':''}.`;
    case '50-50':       return `50% na adjudicação${t?' ('+f50+')':''} + 50% na entrega${t?' ('+f50+')':''}.`;
    case 'prestacoes':  return buildPrestacoes(prestacoes,t);
    case 'custom':      return custom||'';
    default:            return custom||'A combinar.';
  }
};

// ── Pricing helpers ──
const discountAmt=item=>{
  const d=item.discount; if(!d||!d.value) return 0;
  // general discount base = main product + add-ons that have NO individual discount
  // (add-ons with their own discount are excluded from the general discount)
  let base;
  if(item.type==='group'){
    const prod=CATALOGUE.find(p=>p.id===item.id);
    const mainT=prod.main.unitPrice*item.qty;
    const aoT=(item.selectedAddons||[]).reduce((s,aid)=>{
      if((item.offeredAddons||[]).includes(aid)) return s;
      const hasOwnDisc=item.addonDiscounts&&item.addonDiscounts[aid]&&item.addonDiscounts[aid].value;
      if(hasOwnDisc) return s; // excluded — has its own discount
      const ao=prod.addons.find(a=>a.id===aid);
      return s+(ao?ao.unitPrice*addonQty(item,aid):0);
    },0);
    base=mainT+aoT;
  } else {
    base=item.unitPrice*item.qty;
  }
  if(d.type==='pct') return Math.round(base*(d.value/100)*100)/100;
  return Math.min(d.value,base);
};
// addonQty: defaults to main product qty, overridable per addon
const addonQty=(item,aid)=>{
  if(item.addonQty&&item.addonQty[aid]!=null) return item.addonQty[aid];
  return item.qty||1;
};
// addonDiscountAmt: per-addon discount
const addonDiscountAmt=(item,aid)=>{
  const d=item.addonDiscounts&&item.addonDiscounts[aid];
  if(!d||!d.value) return 0;
  const prod=CATALOGUE.find(p=>p.id===item.id);
  const ao=prod&&prod.addons&&prod.addons.find(a=>a.id===aid);
  if(!ao||(item.offeredAddons||[]).includes(aid)) return 0;
  const base=ao.unitPrice*addonQty(item,aid);
  if(d.type==='pct') return Math.round(base*(d.value/100)*100)/100;
  return Math.min(d.value,base);
};
const baseTotal=item=>{
  if(item.type==="group"){
    const prod=CATALOGUE.find(p=>p.id===item.id);
    const mainT=prod.main.unitPrice*item.qty;
    const aoT=(item.selectedAddons||[]).reduce((s,aid)=>{
      if((item.offeredAddons||[]).includes(aid)) return s;
      const ao=prod.addons.find(a=>a.id===aid);
      const gross=ao?ao.unitPrice*addonQty(item,aid):0;
      return s+gross-addonDiscountAmt(item,aid);
    },0);
    return mainT+aoT;
  }
  return item.unitPrice*item.qty;
};
const offerTotal=item=>{
  if(item.type!=="group") return 0;
  const prod=CATALOGUE.find(p=>p.id===item.id);
  return (item.offeredAddons||[]).reduce((s,aid)=>{
    const ao=prod.addons.find(a=>a.id===aid);
    return s+(ao?ao.unitPrice*addonQty(item,aid):0);
  },0);
};
const itemTotal=item=>Math.max(0,baseTotal(item)-discountAmt(item));
const allItems=()=>[...S.selected,...S.custom];
const grandTotal=()=>allItems().reduce((s,i)=>s+itemTotal(i),0);

// ── INTERNAL COST HELPERS ──────────────────────────────────
const itemCost=item=>{
  if(item.type==='group'){
    const prod=CATALOGUE.find(p=>p.id===item.id);
    const mainCost=(prod.main.cost||prod.cost||0)*item.qty;
    const aoCost=(item.selectedAddons||[]).reduce((s,aid)=>{
      const ao=prod.addons.find(a=>a.id===aid);
      return s+(ao&&ao.cost?ao.cost*addonQty(item,aid):0);
    },0);
    return mainCost+aoCost;
  }
  return (item.cost||0)*item.qty;
};
const itemPL=item=>itemTotal(item)-itemCost(item);
const itemMarginPct=item=>{
  const t=itemTotal(item); if(!t) return 0;
  return Math.round((itemPL(item)/t)*1000)/10;
};
const totalCost=()=>allItems().reduce((s,i)=>s+itemCost(i),0);
const totalPL=()=>allItems().reduce((s,i)=>s+itemPL(i),0);

      if(k==='email2') el.classList.toggle('invalid', !!e.target.value && !validEmail(e.target.value));
      if(k==='phone2') el.classList.toggle('invalid', !!e.target.value && !validPhone(e.target.value));
    });
  });
  const nc=document.getElementById('f-notes-client');
  if(nc) nc.addEventListener('input',e=>{ S.notesClient=e.target.value; });
  const ni=document.getElementById('f-notes-internal');
  if(ni) ni.addEventListener('input',e=>{ S.notesInternal=e.target.value; });
  const bcd=document.getElementById('btn-clear-draft');
  if(bcd) bcd.addEventListener('click',()=>{
    S={step:1,lang:S.lang,client:{name:'',company:'',email:'',phone:'',venue:'',nif:'',notes:''},selected:[],custom:[],newC:{name:'',ref:'',qty:1,unitPrice:0,detail:''},cat:'All',error:null,propNum:null,notesInternal:'',notesClient:'',paymentCondition:'A combinar.',deliveryPreset:'imediato',deliveryCondition:'Imediato, salvo rutura de stock na data de aceitação.'};
    _iid=0; clearDraft(); render();
  });
  document.getElementById('s1n').addEventListener('click',()=>{S.step=2;render();window.scrollTo(0,0);});
}

function renderStep2(){
  const cats=CATS_FN();const filtered=S.cat==='All'?CATALOGUE:CATALOGUE.filter(p=>p.category===S.cat);
  const items=allItems(),gt=grandTotal();

  const prodHTML=filtered.map(prod=>{
    // all selected instances of this product
    const instances=S.selected.filter(i=>i.id===prod.id);
    const isGrp=prod.type==='group';

    // render each instance as a card (or unselected state if none)
    const renderInstance=(sel,instIdx)=>{
    const disc=sel&&sel.discount||{type:'pct',value:0};
    const dAmt=sel?discountAmt(sel):0;

    let compHTML='';
    if(isGrp){
      // which included items are currently replaced by a selected addon?
      const replacedIncIds=new Set();
      (sel&&sel.selectedAddons||[]).forEach(aid=>{
        const ao=prod.addons.find(a=>a.id===aid);
        if(ao&&ao.replacesIncluded) ao.replacesIncluded.forEach(rid=>replacedIncIds.add(rid));
      });

      // when NOT selected: show collapsed summary only
      if(!sel){
        const incCount=(prod.included||[]).length;
        const aoCount=(prod.addons||[]).length;
        const parts=[];
        if(incCount>0) parts.push(`${incCount} incluído${incCount!==1?'s':''}`);
        if(aoCount>0) parts.push(`${aoCount} add-on${aoCount!==1?'s':''} opcional${aoCount!==1?'is':''}`);
        compHTML=parts.length?`<div style="margin-top:8px;font-size:11px;color:var(--muted)">
          <span style="color:var(--green);font-weight:600">✓ ${parts.join(' · ')}</span>
          <span style="margin-left:6px;color:var(--faint)">— selecciona para configurar</span>
        </div>`:'';
      } else {
        // selected: show full component list
        const incH=(prod.included||[]).map(inc=>{
          if(replacedIncIds.has(inc.id)) return '';
          const incDispQty=inc.qty&&inc.qty>1?` ×${inc.qty}`:'';
          return `<div class="ci">
            <div class="ci-ca"><div class="ci-ic">✓</div></div>
            <div class="ci-info"><div class="ci-name">${inc.name}${incDispQty}</div><div class="ci-det">${inc.detail||''}</div><span class="bdg bdg-inc">Incluído</span></div>
            <div class="ci-pa"><span style="font-size:11px;color:var(--green);font-weight:600">incluído</span></div>
          </div>`;
        }).join('');

        const aoH=prod.addons.map(ao=>{
          const isSel=(sel.selectedAddons||[]).includes(ao.id);
          const isOff=(sel.offeredAddons||[]).includes(ao.id);
          const isDisabledByMutex=!isSel&&ao.replacesAddon&&ao.replacesAddon.some(rid=>(sel.selectedAddons||[]).includes(rid));
          const subsHint=ao.replacesIncluded&&ao.replacesIncluded.length>0
            ?`<span style="font-size:9px;color:var(--muted);letter-spacing:.5px">substitui componente standard</span>`:'';
          const mutexHint=ao.replacesAddon&&ao.replacesAddon.length>0&&!isSel
            ?`<span style="font-size:9px;color:var(--muted);letter-spacing:.5px">alternativa a outra opção</span>`:'';
          const aoQty=addonQty(sel,ao.id);
          const aoDisc=sel.addonDiscounts&&sel.addonDiscounts[ao.id]||{type:'pct',value:0};
          const aoDscAmt=addonDiscountAmt(sel,ao.id);
          return `<div class="ci" style="${isDisabledByMutex?'opacity:.4':''}">
            <div class="ci-ca">
              <input type="checkbox" class="comp-check" data-prod="${prod.id}" data-iid="${sel._iid}" data-addon="${ao.id}"
                ${isSel?'checked':''} ${isDisabledByMutex?'disabled':''} style="cursor:${!isDisabledByMutex?'pointer':'default'}">
            </div>
            <div class="ci-info">
              <div class="ci-name">${ao.name}</div>
              <div class="ci-det">${ao.detail||''} · <span style="font-family:monospace;font-size:10px">${ao.ref}</span></div>
              <span class="bdg bdg-ao">Add-on</span>
              ${subsHint}${mutexHint}
              ${isSel&&!isOff?`<div class="disc-row ${aoDscAmt>0?'active':''}" style="margin-top:6px;padding:6px 8px" onclick="event.stopPropagation()">
                <span class="disc-label" style="font-size:10px">Desc.</span>
                <div class="disc-type-toggle">
                  <button class="dtt ${aoDisc.type==='pct'?'on':''}" style="padding:3px 7px;font-size:10px" data-aodiid="${sel._iid}" data-aodid="${ao.id}" data-dtype="pct">%</button>
                  <button class="dtt ${aoDisc.type==='fixed'?'on':''}" style="padding:3px 7px;font-size:10px" data-aodiid="${sel._iid}" data-aodid="${ao.id}" data-dtype="fixed">€</button>
                </div>
                <input type="number" class="disc-input aod-input" style="width:54px;padding:4px 6px;font-size:11px"
                  data-aodiid="${sel._iid}" data-aodid="${ao.id}"
                  value="${aoDisc.value||''}" min="0" ${aoDisc.type==='pct'?'max="100"':''}
                  placeholder="0">
                ${aoDscAmt>0?`<span class="disc-result" style="font-size:12px">−${fmt(aoDscAmt)}</span>`:''}
              </div>`:''}
            </div>
            <div class="ci-pa">
              ${isOff?`<span class="ci-struck">${fmt(ao.unitPrice)}</span><span class="ci-zero">€0,00</span>`:`<span class="ci-price">${fmt(ao.unitPrice)}</span>`}
              ${isSel?`<div style="display:flex;align-items:center;gap:5px;margin-top:5px" onclick="event.stopPropagation()">
                <button class="qb" style="width:22px;height:22px;font-size:14px" data-aqprod="${prod.id}" data-aqid="${ao.id}" data-d="-1">−</button>
                <span style="min-width:16px;text-align:center;font-size:13px;font-weight:600">${aoQty}</span>
                <button class="qb" style="width:22px;height:22px;font-size:14px" data-aqprod="${prod.id}" data-aqid="${ao.id}" data-d="1">+</button>
              </div>`:''}
              ${isSel?`<div class="offer-row-wrap">
                <input type="checkbox" class="offer-chk" data-prod="${prod.id}" data-iid="${sel._iid}" data-offer="${ao.id}" ${isOff?'checked':''}>
                <span class="offer-lbl">Oferta</span>
              </div>`:''}
            </div>
          </div>
          ${isSel&&ao.colours&&ao.colours.length?(()=>{
            // per-unit colour selection when qty > 1
            const units=Array.from({length:sel.qty},(_, ui)=>ui);
            const colourMap=sel.addonColours&&sel.addonColours[ao.id]||{};
            const isMulti=sel.qty>1;
            return `<div onclick="event.stopPropagation()">
              ${units.map(ui=>`
              <div style="margin-top:${ui===0?'10':'6'}px">
                ${isMulti?`<div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600">Unidade ${ui+1}:</div>`:''}
                <div class="colour-picker" style="margin-top:0">
                  ${ao.colours.map(col=>{
                    const selCode=isMulti?(colourMap[ui]&&colourMap[ui].code):(colourMap.code);
                    const isSel2=selCode===col.code;
                    return `<div class="colour-swatch ${isSel2?'selected':''}"
                      style="background:${col.hex}"
                      title="${col.code} ${col.name}"
                      data-cprod="${prod.id}" data-ciid="${sel._iid}" data-caoid="${ao.id}"
                      data-cunit="${ui}" data-cmulti="${isMulti?1:0}"
                      data-ccode="${col.code}" data-cname="${col.name}" data-chex="${col.hex}">
                    </div>`;
                  }).join('')}
                  ${isMulti?(colourMap[ui]?`
                  <div class="colour-selected-label" style="width:100%;margin-top:2px">
                    <div class="colour-selected-dot" style="background:${colourMap[ui].hex}"></div>
                    <span>${colourMap[ui].code} — ${colourMap[ui].name}</span>
                  </div>`:'<div style="width:100%;margin-top:2px;font-size:10px;color:var(--faint)">Escolhe uma cor</div>')
                  :(colourMap.code?`
                  <div class="colour-selected-label" style="width:100%;margin-top:2px">
                    <div class="colour-selected-dot" style="background:${colourMap.hex}"></div>
                    <span>${colourMap.code} — ${colourMap.name}</span>
                  </div>`:'<div style="width:100%;margin-top:2px;font-size:10px;color:var(--faint)">Escolhe uma cor</div>')}
                </div>
              </div>`).join('')}
            </div>`;
          })():''}`;
        }).join('');
        compHTML=`<div class="cw">${incH}${aoH}</div>`;
      }
    }

    const discHTML=sel?`
      <div class="disc-row ${dAmt>0?'active':''}">
        <span class="disc-label">Desconto</span>
        <div class="disc-type-toggle">
          <button class="dtt ${disc.type==='pct'?'on':''}" data-iid="${sel._iid}" data-dtype="pct">%</button>
          <button class="dtt ${disc.type==='fixed'?'on':''}" data-iid="${sel._iid}" data-dtype="fixed">€</button>
        </div>
        <input type="number" class="disc-input" data-iid="${sel._iid}"
          value="${disc.value||''}" min="0" ${disc.type==='pct'?'max="100"':''}
          placeholder="${disc.type==='pct'?'0':'0'}">
        ${dAmt>0?`<span class="disc-result">−${fmt(dAmt)}</span>`:''}
      </div>`:'';

    const dispP=isGrp?(sel?fmt(itemTotal(sel))+' total':fmt(prod.main.unitPrice)+'+'):fmt(prod.unitPrice);

    return `
      <div class="prow ${sel?'sel':''}" data-id="${prod.id}" data-iid="${sel?sel._iid:''}">
        <div class="pck ${sel?'on':''}">✓</div>
        <div class="pi">
          <div class="pn">${prod.name}${instances.length>1?' <span style="font-size:11px;color:var(--muted);font-weight:400">— unidade '+(instIdx+1)+'</span>':''}</div>
          <div class="pr">${prod.ref}</div>
          ${compHTML}
          ${discHTML}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="pp">${dispP}</div>
          ${sel?`<div class="qty-ctrl">
            <button class="qb" data-qiid="${sel._iid}" data-d="-1">−</button>
            <span class="qv">${sel.qty}</span>
            <button class="qb" data-qiid="${sel._iid}" data-d="1">+</button>
          </div>
          <button style="margin-top:6px;background:none;border:none;color:var(--faint);font-size:11px;cursor:pointer;padding:2px 0" data-rmiid="${sel._iid}">✕ remover</button>`:''}
        </div>
      </div>`;
    }; // end renderInstance

    // build HTML: unselected card + all instance cards + "add another" button
    const unselCard=instances.length===0?`
      <div class="prow" data-id="${prod.id}" data-iid="">
        <div class="pck">✓</div>
        <div class="pi">
          <div class="pn">${prod.name}</div>
          <div class="pr">${prod.ref}</div>
          ${isGrp?`<div style="margin-top:8px;font-size:11px;color:var(--muted)">
            <span style="color:var(--green);font-weight:600">✓ ${(prod.included||[]).length} incluído${(prod.included||[]).length!==1?'s':''}</span>
            ${(prod.addons||[]).length>0?`<span style="margin-left:6px;color:var(--faint)">· ${(prod.addons||[]).length} add-ons</span>`:''}
            <span style="margin-left:6px;color:var(--faint)">— selecciona para configurar</span>
          </div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="pp">${isGrp?fmt(prod.main.unitPrice)+'+':fmt(prod.unitPrice)}</div>
        </div>
      </div>`:'';

    const instCards=instances.map((sel,idx)=>renderInstance(sel,idx)).join('');

    const addAnotherBtn=instances.length>0?`
      <div style="padding:8px 18px 4px;display:flex;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:7px 14px" data-addmore="${prod.id}">+ Adicionar outra unidade</button>
      </div>`:'';

    return unselCard+instCards+addAnotherBtn;
  }).join('');

  const custH=S.custom.map(item=>`
    <div class="cust-item">
      <span style="flex:1;font-size:14px;font-weight:500">${item.qty}× ${esc(item.name)}</span>
      <span style="font-family:var(--serif);font-size:16px">${fmt(item.unitPrice*item.qty)}</span>
      <button class="rm" data-rmid="${item.id}">×</button>
    </div>`).join('');

  document.getElementById('step-2').innerHTML=`
    <div class="sec-head"><h2>Select Equipment</h2><p>Tap to select. Add-ons, offers and discounts per product.</p></div>
    <div class="cat-strip">${CATS_FN().map(c=>`<button class="ctab ${S.cat===c?'on':''}" data-cat="${c}">${c}</button>`).join('')}</div>
    ${prodHTML}
    <div class="card" style="margin-top:20px">
      <div class="card-label">Add Custom Item</div>
      <div class="g2">
        <div class="fl s2"><label>Name</label><input id="ci-n" value="${esc(S.newC.name)}" placeholder="Custom item"></div>
        <div class="fl"><label>Ref</label><input id="ci-r" value="${esc(S.newC.ref)}" placeholder="REF-001"></div>
        <div class="fl"><label>Qty</label><input id="ci-q" type="number" value="${S.newC.qty}" min="1"></div>
        <div class="fl"><label>Unit €</label><input id="ci-p" type="number" value="${S.newC.unitPrice}" min="0"></div>
        <div class="fl s2"><label>Detail</label><input id="ci-d" value="${esc(S.newC.detail)}" placeholder="Short description"></div>
      </div>
      <button class="btn btn-gold btn-sm" id="ci-add" style="margin-top:4px">+ Add Item</button>
      ${custH}
    </div>
    <div class="r-btw">
      <button class="btn btn-ghost" id="s2b">← Back</button>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="text-align:right">
          <div style="font-size:12px;color:var(--muted)">${items.length} item${items.length!==1?'s':''}</div>
          <div style="font-family:var(--serif);font-size:22px">${fmt(gt)}</div>
        </div>
        <button class="btn btn-primary" id="s2n" ${items.length===0?'disabled':''}>Review →</button>
      </div>
    </div>`;

  // events
  document.querySelectorAll('.ctab').forEach(t=>t.addEventListener('click',()=>{S.cat=t.dataset.cat;render();}));
  document.querySelectorAll('.prow').forEach(row=>{
    row.addEventListener('click',e=>{
      if(['INPUT','BUTTON'].includes(e.target.tagName)) return;
      const id=row.dataset.id; if(!id) return;
      const iid=row.dataset.iid;
      const prod=CATALOGUE.find(p=>p.id===id);
      if(iid){
        // already selected — deselect this instance
        S.selected=S.selected.filter(i=>i._iid!==parseInt(iid));
      } else {
        // unselected row → add first instance
        S.selected.push(newInstance(prod));
      }
      render();
    });
  });
  // remove instance button
  document.querySelectorAll('[data-rmiid]').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const iid=parseInt(b.dataset.rmiid);
      S.selected=S.selected.filter(i=>i._iid!==iid);
      render();
    });
  });
  // add another unit button
  document.querySelectorAll('[data-addmore]').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const prod=CATALOGUE.find(p=>p.id===b.dataset.addmore);
      if(prod) S.selected.push(newInstance(prod));
      render();
    });
  });
  document.querySelectorAll('.comp-check').forEach(cb=>{
    cb.addEventListener('change',e=>{
      e.stopPropagation();
      const sel=S.selected.find(i=>i._iid===parseInt(cb.dataset.iid)); if(!sel) return;
      const prod=CATALOGUE.find(p=>p.id===sel.id);
      const addonDef=prod&&prod.addons?prod.addons.find(a=>a.id===cb.dataset.addon):null;
      if(cb.checked){
        if(!sel.selectedAddons.includes(cb.dataset.addon)) sel.selectedAddons.push(cb.dataset.addon);
        // remove mutually exclusive addons (replacesAddon)
        if(addonDef&&addonDef.replacesAddon){
          addonDef.replacesAddon.forEach(rid=>{
            sel.selectedAddons=sel.selectedAddons.filter(a=>a!==rid);
            sel.offeredAddons=(sel.offeredAddons||[]).filter(a=>a!==rid);
          });
        }
      } else {
        sel.selectedAddons=sel.selectedAddons.filter(a=>a!==cb.dataset.addon);
        sel.offeredAddons=(sel.offeredAddons||[]).filter(a=>a!==cb.dataset.addon);
      }
      render();
    });
  });
  // colour swatch click — single unit or per-unit
  document.querySelectorAll('.colour-swatch[data-cprod]').forEach(sw=>{
    sw.addEventListener('click',e=>{
      e.stopPropagation();
      const sel=S.selected.find(i=>i._iid===parseInt(sw.dataset.ciid)); if(!sel) return;
      sel.addonColours=sel.addonColours||{};
      const col={code:sw.dataset.ccode,name:sw.dataset.cname,hex:sw.dataset.chex};
      if(sw.dataset.cmulti==='1'){
        // multi-unit: store as object keyed by unit index
        const prev=sel.addonColours[sw.dataset.caoid]||{};
        sel.addonColours[sw.dataset.caoid]={...prev,[sw.dataset.cunit]:col};
      } else {
        sel.addonColours[sw.dataset.caoid]=col;
      }
      render();
    });
  });
  document.querySelectorAll('.offer-chk').forEach(cb=>{
    cb.addEventListener('change',e=>{
      e.stopPropagation();
      const sel=S.selected.find(i=>i._iid===parseInt(cb.dataset.iid)); if(!sel) return;
      sel.offeredAddons=sel.offeredAddons||[];
      if(cb.checked){if(!sel.offeredAddons.includes(cb.dataset.offer))sel.offeredAddons.push(cb.dataset.offer);}
      else sel.offeredAddons=sel.offeredAddons.filter(a=>a!==cb.dataset.offer);
      render();
    });
  });
  // addon quantity buttons — default is item.qty, allow override
  document.querySelectorAll('.qb[data-aqid]').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const sel=S.selected.find(i=>i._iid===parseInt(b.dataset.aqiid)); if(!sel) return;
      sel.addonQty=sel.addonQty||{};
      const cur=addonQty(sel,b.dataset.aqid);
      sel.addonQty[b.dataset.aqid]=Math.max(1,cur+parseInt(b.dataset.d));
      render();
    });
  });
  // addon discount type toggle
  document.querySelectorAll('.dtt[data-aodprod]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const sel=S.selected.find(i=>i._iid===parseInt(btn.dataset.aodiid)); if(!sel) return;
      sel.addonDiscounts=sel.addonDiscounts||{};
      sel.addonDiscounts[btn.dataset.aodid]={type:btn.dataset.dtype,value:0};
      render();
    });
  });
  // addon discount value input
  document.querySelectorAll('.aod-input').forEach(inp=>{
    inp.addEventListener('click',e=>e.stopPropagation());
    inp.addEventListener('input',e=>{
      e.stopPropagation();
      const sel=S.selected.find(i=>i._iid===parseInt(inp.dataset.aodiid)); if(!sel) return;
      sel.addonDiscounts=sel.addonDiscounts||{};
      const cur=sel.addonDiscounts[inp.dataset.aodid]||{type:'pct',value:0};
      let v=parseFloat(e.target.value)||0;
      if(cur.type==='pct') v=Math.min(100,Math.max(0,v));
      sel.addonDiscounts[inp.dataset.aodid]={...cur,value:v};
      // live update result label
      const dAmt=addonDiscountAmt(sel,inp.dataset.aodid);
      const row=inp.closest('.disc-row');
      row.classList.toggle('active',dAmt>0);
      let res=row.querySelector('.disc-result');
      if(dAmt>0){
        if(!res){res=document.createElement('span');res.className='disc-result';res.style.fontSize='12px';row.appendChild(res);}
        res.textContent='−'+fmt(dAmt);
      } else if(res) res.remove();
    });
  });
  document.querySelectorAll('.dtt[data-dtype]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const sel=S.selected.find(i=>i._iid===parseInt(btn.dataset.iid)); if(!sel) return;
      sel.discount={type:btn.dataset.dtype,value:0};
      render();
    });
  });
  document.querySelectorAll('.disc-input').forEach(inp=>{
    inp.addEventListener('click',e=>e.stopPropagation());
    inp.addEventListener('input',e=>{
      e.stopPropagation();
      const sel=S.selected.find(i=>i._iid===parseInt(inp.dataset.iid)); if(!sel) return;
      let v=parseFloat(e.target.value)||0;
      if(sel.discount.type==='pct') v=Math.min(100,Math.max(0,v));
      sel.discount.value=v;
      const dAmt=discountAmt(sel);
      const row=inp.closest('.disc-row');
      row.classList.toggle('active',dAmt>0);
      let res=row.querySelector('.disc-result');
      if(dAmt>0){
        if(!res){res=document.createElement('span');res.className='disc-result';row.appendChild(res);}
        res.textContent='−'+fmt(dAmt);
      } else if(res) res.remove();
    });
  });
  document.querySelectorAll('.qb').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const item=b.dataset.qiid
        ?S.selected.find(i=>i._iid===parseInt(b.dataset.qiid))
        :S.custom.find(i=>i.id===b.dataset.qid);
      if(item) item.qty=Math.max(1,item.qty+parseInt(b.dataset.d));
      render();
    });
  });
  ['ci-n','ci-r','ci-q','ci-p','ci-d'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    const km={n:'name',r:'ref',q:'qty',p:'unitPrice',d:'detail'};
    const k=km[id.replace('ci-','')];
    el.addEventListener('input',e=>{ S.newC[k]=(k==='qty'||k==='unitPrice')?Number(e.target.value):e.target.value; });
  });
  document.getElementById('ci-add').addEventListener('click',()=>{
    if(!S.newC.name) return;

    </div>

    ${S.error?`<div class="err">${S.error}</div>`:''}

  document.getElementById('s3b').addEventListener('click',()=>{S.step=2;render();window.scrollTo(0,0);});

  document.getElementById('s3g').addEventListener('click',generateProposal);

      const k=div.dataset.delk;
      S.deliveryPreset=k;
      S.deliveryCondition=buildDeliveryCondition(k,S.deliveryCondition);
      if(k==='custom') S.deliveryCondition='';
      render();
    });
  });
  document.querySelectorAll('input[name="delpreset"]').forEach(r=>{
    r.addEventListener('change',e=>{
      S.deliveryPreset=e.target.value;
      S.deliveryCondition=buildDeliveryCondition(e.target.value,S.deliveryCondition);
      if(e.target.value==='custom') S.deliveryCondition='';

      S.paymentPreset=k;
      const vatRate=0.23,gtVat=grandTotal()*(1+vatRate);
      S.paymentCondition=buildPaymentCondition(k,S.prestacoes,S.paymentCondition,gtVat);
      if(k==='custom') S.paymentCondition='';
      render();
    });
  });
  document.querySelectorAll('input[name="paypreset"]').forEach(r=>{
    r.addEventListener('change',e=>{
      S.paymentPreset=e.target.value;
      const vatRate=0.23,gtVat=grandTotal()*(1+vatRate);
      S.paymentCondition=buildPaymentCondition(e.target.value,S.prestacoes,S.paymentCondition,gtVat);
      if(e.target.value==='custom') S.paymentCondition='';
      render();
    });

    S.prestacoes=parseInt(e.target.value)||null;

    S.paymentCondition=buildPaymentCondition('prestacoes',S.prestacoes,null,gtVat);
  });

  // ── DRAG AND DROP (desktop + mobile) ──
  const list=document.getElementById('order-list');
  let dragIdx=null, touchItem=null, touchClone=null, touchStartY=0;

  // Desktop drag
  list.querySelectorAll('.order-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{
      dragIdx=parseInt(item.dataset.idx);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();
      const overIdx=parseInt(item.dataset.idx);
      if(overIdx===dragIdx) return;
      list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop',e=>{
      e.preventDefault();
      const toIdx=parseInt(item.dataset.idx);
      if(toIdx===dragIdx) return;
      reorder(dragIdx,toIdx);
    });
  });

  // Mobile touch drag
  list.querySelectorAll('.order-item').forEach(item=>{
    item.addEventListener('touchstart',e=>{
      touchItem=item;
      touchStartY=e.touches[0].clientY;
      touchClone=item.cloneNode(true);
      touchClone.style.cssText=`position:fixed;left:${item.getBoundingClientRect().left}px;top:${item.getBoundingClientRect().top}px;width:${item.offsetWidth}px;opacity:.85;pointer-events:none;z-index:9999;background:white;border:1.5px solid var(--gold);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);`;
      document.body.appendChild(touchClone);
      item.style.opacity='.3';
    },{passive:true});
    item.addEventListener('touchmove',e=>{
      if(!touchClone) return;
      const dy=e.touches[0].clientY-touchStartY;
      touchClone.style.top=(item.getBoundingClientRect().top+dy)+'px';
      // highlight target
      list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('drag-over'));
      const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
      const target=el&&el.closest('.order-item');
      if(target&&target!==item) target.classList.add('drag-over');
    },{passive:true});
    item.addEventListener('touchend',e=>{
      if(!touchClone) return;
      touchClone.remove(); touchClone=null;
      if(touchItem) touchItem.style.opacity='';
      const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
      const target=el&&el.closest('.order-item');
      if(target&&target!==item){
        reorder(parseInt(item.dataset.idx),parseInt(target.dataset.idx));
      } else {
        list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('drag-over'));
      }
    });
  });

  function reorder(from,to){
    // work on a unified ordered array
    const unified=[...S.selected,...S.custom];
    const [moved]=unified.splice(from,1);
    unified.splice(to,0,moved);
    // split back: custom items have ids starting with 'c' + timestamp
    S.selected=unified.filter(i=>!String(i.id).match(/^c\d{10,}/));
    S.custom=unified.filter(i=>String(i.id).match(/^c\d{10,}/));
    render();
  }
}

// ── API helper ──
async function callAPI(action, payload={}){
  if(!APPS_SCRIPT_URL) return null;
  try{
    if(action === 'saveProposal'){
      // fire and forget via POST no-cors
      fetch(APPS_SCRIPT_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({...payload, action, key:SCRIPT_SECRET})
      }).catch(()=>{});
      return {status:'ok'};
    }
    // login, getCatalogue, getHistory — use GET (no CORS issues)
    const params = new URLSearchParams({action, key:SCRIPT_SECRET, ...payload});
    const r = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`, {method:'GET'});
    return await r.json();
  } catch(e){
    console.warn('API error:',e);
    return null;
  }
}

async function registerToSheet(payload){
  if(!APPS_SCRIPT_URL) return;
  await callAPI('saveProposal',{
    ...payload,
    user: CURRENT_USER?.nome||'',
    nif: S.client.nif||''
  });
}

function renderHistoryModal(){
  const hist=getHistory();
  const modal=document.getElementById('hist-modal');
  const body=document.getElementById('hist-body');
  if(!hist.length){
    body.innerHTML='<div style="text-align:center;padding:40px;color:var(--faint);font-size:14px">Ainda não há propostas no histórico.<br>As propostas são guardadas automaticamente quando geras o PDF.</div>';
  } else {
    body.innerHTML=hist.map((h,i)=>`
      <div class="hist-row" data-hidx="${i}">
        <div>
          <div class="hist-doc">${h.docNum}</div>
          <div class="hist-client">${h.client||'—'}${h.company?' · '+h.company:''}</div>
          <div class="hist-date">${h.date}</div>
        </div>
        <div class="hist-total">${fmt(h.totalPVP)}</div>
        <button class="btn btn-ghost btn-sm" style="font-size:11px;flex-shrink:0" data-hload="${i}">Carregar</button>
        <button class="btn btn-ghost btn-sm" style="font-size:11px;flex-shrink:0" data-hdup="${i}">Duplicar</button>
        <button style="background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0" data-hdel="${h.docNum}" title="Apagar">×</button>
      </div>`).join('');
    // load
    body.querySelectorAll('[data-hload]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const h=hist[parseInt(btn.dataset.hload)];
        if(!h||!h.snapshot) return;
        Object.assign(S,JSON.parse(JSON.stringify(h.snapshot)));
        _iid=S.selected.reduce((m,i)=>Math.max(m,i._iid||0),0);
        modal.style.display='none';
        render();
      });
    });
    // duplicate
    body.querySelectorAll('[data-hdup]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const h=hist[parseInt(btn.dataset.hdup)];
        if(!h||!h.snapshot) return;
        const clone=JSON.parse(JSON.stringify(h.snapshot));
        clone.propNum=''; clone.step=1; clone._previewing=false;
        Object.assign(S,clone);
        _iid=S.selected.reduce((m,i)=>Math.max(m,i._iid||0),0);
        modal.style.display='none';
        render();
      });
    });
    // delete
    body.querySelectorAll('[data-hdel]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        deleteFromHistory(btn.dataset.hdel);
        renderHistoryModal();
      });
    });
  }
  modal.style.display='block';
}

          <div class="about-pillar-text">Instalação e formação incluídas. Assistência técnica disponível durante todo o ciclo de vida do equipamento.</div>
        </div>
        <div class="about-pillar">
          <div class="about-pillar-title">Compromisso</div>
          <div class="about-pillar-text">Atendimento personalizado, dedicação e apoio total. A sua satisfação e confiança são a nossa prioridade.</div>

      </div>
      <div class="about-footer-line">

    <!-- INTRO -->

        <div class="cond-row"><div class="cond-k">${k}</div><div class="cond-v">${v}</div></div>`).join('')}

    <!-- SIGNATURE -->
    <div class="d-sig">

      <div class="d-sig-body">

          <div class="d-sf"><div class="d-sf-lbl">${t.sigClient}</div><div class="d-sf-val"></div><div class="d-sf-lbl" style="margin-top:6px">${esc(c.name)}</div></div>
          <div class="d-sf"><div class="d-sf-lbl">${t.sigDate}</div><div class="d-sf-val"></div><div class="d-sf-lbl" style="margin-top:6px">&nbsp;</div></div>

// ── LOGIN LOGIC ──────────────────────────────────────────────
function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-bar').style.display='none';
  document.getElementById('app-body').style.display='none';
  document.getElementById('doc-wrap').classList.remove('visible');
}

async function showApp(user){
  CURRENT_USER=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-bar').style.display='flex';
  document.getElementById('app-body').style.display='block';

  // show loading indicator without destroying the DOM structure
  const loadingDiv = document.createElement('div');
  loadingDiv.id = 'catalogue-loading';
  loadingDiv.style.cssText = 'text-align:center;padding:80px 20px;color:var(--muted);font-size:13px';
  loadingDiv.textContent = 'A carregar catálogo...';
  document.getElementById('app-body').prepend(loadingDiv);

  const ul=document.getElementById('user-label');
  if(ul) ul.textContent=user.nome||user.email;

  // wire up logout
  const lb=document.getElementById('btn-logout');
  if(lb) lb.addEventListener('click',()=>{
    CURRENT_USER=null;
    sessionStorage.removeItem('dsp_session');localStorage.removeItem('dsp_session');
    showLogin();
  });
  // wire up history
  const hb=document.getElementById('btn-history');
  if(hb) hb.addEventListener('click',renderHistoryModal);
  const hc=document.getElementById('hist-close');
  if(hc) hc.addEventListener('click',()=>{ document.getElementById('hist-modal').style.display='none'; });

  // load catalogue from Sheet (or fallback)
  await loadCatalogue();

  // remove loading indicator
  const ld = document.getElementById('catalogue-loading');
  if(ld) ld.remove();

  // load draft
  if(loadDraft() && S.step>0){ render(); return; }
  render();
}

// startup
(function(){
  // check saved session
  try{
    const saved=JSON.parse(localStorage.getItem('dsp_session')||'null');
    if(saved && saved.email){
      showApp(saved);
      return;
    }
  } catch(e){}

  // no session — if no Apps Script URL, skip login (local use)
  if(!APPS_SCRIPT_URL){
    CURRENT_USER={nome:'Local',email:'local'};
    showApp(CURRENT_USER);
    return;
  }

  showLogin();

  const loginBtn=document.getElementById('login-btn');
  const loginEmail=document.getElementById('login-email');
  const loginPassword=document.getElementById('login-password');
  const loginError=document.getElementById('login-error');
  const loginLoading=document.getElementById('login-loading');

  async function doLogin(){
    const email=loginEmail.value.trim();
    const password=loginPassword.value;
    if(!email||!password){ loginError.textContent='Preenche email e password.'; loginError.style.display='block'; return; }
    loginBtn.disabled=true;
    loginLoading.style.display='block';
    loginError.style.display='none';
    const res=await callAPI('login',{email,password});
    loginBtn.disabled=false;
    loginLoading.style.display='none';
    if(res&&res.status==='ok'){
      localStorage.setItem('dsp_session',JSON.stringify(res.user));
      showApp(res.user);
    } else {
      loginError.textContent=res?.message||'Erro ao fazer login. Tenta novamente.';
      loginError.style.display='block';
    }
  }

  loginBtn.addEventListener('click',doLogin);
  loginPassword.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  loginEmail.addEventListener('keydown',e=>{ if(e.key==='Enter') loginPassword.focus(); });
})();
</script>
